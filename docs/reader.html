<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读 — 长生不死的我，在南宋点歪了科技树</title>
  <meta name="description" content="在线阅读《长生不死的我，在南宋点歪了科技树》正文章节。">
  <link rel="stylesheet" href="css/style.css">
  <!-- IconPark 图标（via Iconify CDN） -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js" defer></script>
</head>

<body>

  <!-- Reading Progress -->
  <div class="reader-progress" id="reader-progress"></div>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <a href="index.html" class="nav-brand">长生不死</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="catalog.html">目录</a></li>
      <li><a href="characters.html">图鉴</a></li>
      <li><a href="about.html">关于</a></li>
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Reader -->
  <div class="reader-container">
    <div class="reader-chapter-header">
      <h1 id="chapter-header-title">加载中…</h1>
      <p class="chapter-meta-info" id="chapter-meta-info"></p>
    </div>

    <div class="reader-content" id="chapter-content">
      <p style="text-align:center;color:var(--text-muted);">正在加载章节内容…</p>
    </div>

    <div class="reader-nav">
      <a href="#" id="prev-chapter" class="disabled">← 没有上一章</a>
      <a href="catalog.html" id="reader-open-catalog">目录</a>
      <a href="#" id="next-chapter" class="disabled">敬请期待 →</a>
    </div>
  </div>

  <!-- Comments -->
  <section class="reader-comments" id="reader-comments">
    <div class="reader-comments-header">
      <span class="reader-comments-gem">◆</span>
      <h3>读者留言</h3>
      <span class="reader-comments-gem">◆</span>
    </div>
    <div id="giscus-container"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-brand">长生不死的我，在南宋点歪了科技树</p>
    <ul class="footer-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="catalog.html">目录</a></li>
      <li><a href="characters.html">图鉴</a></li>
      <li><a href="about.html">关于</a></li>
    </ul>
    <p class="footer-copy">© 2026 kailous. All rights reserved.</p>
  </footer>

  <!-- Reader Toolbar -->
  <div class="reader-toolbar" id="reader-toolbar">

    <!-- 字号 -->
    <button class="toolbar-btn" id="font-decrease" title="缩小字号">
      <span class="iconify" data-icon="icon-park-outline:zoom-out" data-width="18" data-height="18"></span>
    </button>
    <button class="toolbar-btn" id="font-increase" title="放大字号">
      <span class="iconify" data-icon="icon-park-outline:zoom-in" data-width="18" data-height="18"></span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- 目录 -->
    <button class="toolbar-btn" id="toolbar-catalog" title="目录">
      <span class="iconify" data-icon="icon-park-outline:list" data-width="18" data-height="18"></span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- 书签 -->
    <button class="toolbar-btn" id="bookmark-save" title="保存书签">
      <span class="iconify" data-icon="icon-park-outline:bookmark-one" data-width="18" data-height="18"></span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- 朗读：play / pause 用两个 span 切换，避免 innerHTML 替换导致 Iconify 重渲染 -->
    <button class="toolbar-btn" id="tts-toggle" title="开始朗读">
      <!-- 停止状态：acoustic -->
      <span class="tts-icon-start"><span class="iconify" data-icon="icon-park-outline:acoustic" data-width="18" data-height="18"></span></span>
      <!-- 暂停状态：play-one -->
      <span class="tts-icon-resume" style="display:none"><span class="iconify" data-icon="icon-park-outline:play-one" data-width="18" data-height="18"></span></span>
      <!-- 播放中：pause-one -->
      <span class="tts-icon-pause" style="display:none"><span class="iconify" data-icon="icon-park-outline:pause-one" data-width="18" data-height="18"></span></span>
    </button>
    <button class="toolbar-btn tts-extra" id="tts-stop" title="停止朗读">
      <span class="iconify" data-icon="icon-park-outline:square" data-width="18" data-height="18"></span>
    </button>
    <button class="toolbar-btn tts-extra" id="tts-speed" title="朗读速度">1x</button>

  </div>

  <!-- Bookmark Restore Toast -->
  <div class="bookmark-toast" id="bookmark-toast">
    <span>📌 发现上次书签</span>
    <button id="bookmark-jump">跳转</button>
    <button id="bookmark-dismiss">✕</button>
  </div>

  <!-- Floating Catalog Overlay -->
  <div class="reader-catalog-overlay" id="reader-catalog-overlay">
    <div class="reader-catalog-content">
      <div class="reader-catalog-header">
        <h2>查看目录</h2>
        <button class="close-overlay" id="close-catalog">✕</button>
      </div>
      <div class="reader-catalog-index" id="reader-catalog-index">
        <p style="text-align:center;padding:2rem;">正在加载目录…</p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/reader.js"></script>
</body>

</html>
