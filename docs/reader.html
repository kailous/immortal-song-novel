<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读 — 长生不死的我，在南宋点歪了科技树</title>
  <meta name="description" content="在线阅读《长生不死的我，在南宋点歪了科技树》正文章节。">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Reading Progress -->
  <div class="reader-progress" id="reader-progress"></div>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <a href="index.html" class="nav-brand" data-i18n="nav.brand">长生不死</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" data-i18n="nav.home">首页</a></li>
      <li><a href="catalog.html" data-i18n="nav.catalog">目录</a></li>
      <li><a href="characters.html" data-i18n="nav.characters">图鉴</a></li>
      <li><a href="about.html" data-i18n="nav.about">关于</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" title="Switch Language">EN</button>
    <button class="nav-toggle" id="nav-toggle" data-i18n-aria="nav.menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Reader -->
  <div class="reader-container">
    <div class="reader-chapter-header">
      <h1 id="chapter-header-title" data-i18n="reader.header.loading">加载中…</h1>
      <p class="chapter-meta-info" id="chapter-meta-info"></p>
    </div>

    <div class="reader-content" id="chapter-content">
      <p style="text-align:center;color:var(--text-muted);" data-i18n="reader.header.loading">正在加载章节内容…</p>
    </div>

    <div class="reader-nav">
      <a href="#" id="prev-chapter" class="disabled" data-i18n="reader.prev">← 没有上一章</a>
      <a href="catalog.html" id="reader-open-catalog" data-i18n="reader.catalog.btn">目录</a>
      <a href="#" id="next-chapter" class="disabled" data-i18n="reader.next">敬请期待 →</a>
    </div>
  </div>

  <!-- Comments -->
  <section class="reader-comments" id="reader-comments">
    <div class="reader-comments-header">
      <span class="reader-comments-gem">◆</span>
      <h3 data-i18n="reader.comments.title">读者留言</h3>
      <span class="reader-comments-gem">◆</span>
    </div>
    <div id="giscus-container"></div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-brand" data-i18n="footer.brand">长生不死的我，在南宋点歪了科技树</p>
    <ul class="footer-links">
      <li><a href="index.html" data-i18n="nav.home">首页</a></li>
      <li><a href="catalog.html" data-i18n="nav.catalog">目录</a></li>
      <li><a href="characters.html" data-i18n="nav.characters">图鉴</a></li>
      <li><a href="about.html" data-i18n="nav.about">关于</a></li>
    </ul>
    <p class="footer-copy" data-i18n="footer.copy">© 2026 kailous. All rights reserved.</p>
  </footer>

  <!-- Reader Toolbar -->
  <div class="reader-toolbar" id="reader-toolbar">
    <button class="toolbar-btn" id="font-decrease" data-i18n-aria="toolbar.font.decrease" title="缩小字号">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M8 11h6M16 16l5 5"></path></svg>
    </button>
    <button class="toolbar-btn" id="font-increase" data-i18n-aria="toolbar.font.increase" title="放大字号">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M8 11h6M11 8v6M16 16l5 5"></path></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="toolbar-catalog" data-i18n-aria="nav.catalog" title="目录">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13"></path><path d="M3 6h.01M3 12h.01M3 18h.01"></path></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="bookmark-save" data-i18n-aria="reader.bookmark.save" title="保存书签">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12v17l-6-4-6 4z"></path></svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="tts-toggle" title="开始朗读">
      <span class="tts-icon-start"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9z"></path><path d="M16 9a5 5 0 0 1 0 6M18.5 6.5a9 9 0 0 1 0 11"></path></svg></span>
      <span class="tts-icon-resume" style="display:none"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg></span>
      <span class="tts-icon-pause" style="display:none"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14M16 5v14"></path></svg></span>
    </button>
    <button class="toolbar-btn tts-extra" id="tts-stop" title="停止朗读">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="7" width="10" height="10"></rect></svg>
    </button>
    <button class="toolbar-btn tts-extra" id="tts-speed" title="朗读速度">1x</button>
  </div>

  <!-- Bookmark Restore Toast -->
  <div class="bookmark-toast" id="bookmark-toast">
    <span data-i18n="reader.bookmark.toast">📌 发现上次书签</span>
    <button id="bookmark-jump" data-i18n="reader.bookmark.jump">跳转</button>
    <button id="bookmark-dismiss">✕</button>
  </div>

  <!-- Floating Catalog Overlay -->
  <div class="reader-catalog-overlay" id="reader-catalog-overlay">
    <div class="reader-catalog-content">
      <div class="reader-catalog-header">
        <h2 data-i18n="reader.overlay.title">查看目录</h2>
        <button class="close-overlay" id="close-catalog">✕</button>
      </div>
      <div class="reader-catalog-index" id="reader-catalog-index">
        <p style="text-align:center;padding:2rem;" data-i18n="reader.overlay.load">正在加载目录…</p>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/reader.js"></script>
</body>

</html>
