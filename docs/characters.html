<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0a0b0f">
  <meta name="apple-mobile-web-app-title" content="长生不死">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">
    <a href="index.html" class="nav-brand" data-i18n="nav.brand">长生不死</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html" data-i18n="nav.home">首页</a></li>
      <li><a href="catalog.html" data-i18n="nav.catalog">目录</a></li>
      <li><a href="characters.html" data-i18n="nav.characters">图鉴</a></li>
      <li><a href="about.html" data-i18n="nav.about">关于</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" title="Switch Language">EN</button>
    <button class="nav-toggle" id="nav-toggle" data-i18n-aria="nav.menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <p class="section-label" data-i18n="chars.label">CHARACTERS</p>
    <h1 data-i18n="chars.title">角色图鉴</h1>
    <p data-i18n="chars.desc">命运棋局中的关键落子</p>
  </div>

  <!-- Character Cards -->
  <div class="characters-grid" id="characters-grid">
    <div class="character-card reveal" style="height: 500px; background: var(--bg-card); opacity: 0.3;"></div>
    <div class="character-card reveal" style="height: 500px; background: var(--bg-card); opacity: 0.3;"></div>
    <div class="character-card reveal" style="height: 500px; background: var(--bg-card); opacity: 0.3;"></div>
  </div>

  <!-- Factions / Races -->
  <div style="padding: 0 2rem 0;">
    <div class="section-header reveal" style="margin-top: 4rem;">
      <p class="section-label">FACTIONS &amp; RACES</p>
      <h2 class="section-title">种族 · 势力</h2>
    </div>
    <div id="factions-grid"></div>
  </div>

  <!-- Items -->
  <div style="padding: 0 2rem 4rem;">
    <div class="section-header reveal" style="margin-top: 4rem;">
      <p class="section-label" data-i18n="items.label">KEY ITEMS</p>
      <h2 class="section-title" data-i18n="items.title">关键道具</h2>
    </div>
    <div id="items-grid"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-brand" data-i18n="footer.brand">长生不死的我，在南宋点歪了科技树</p>
    <ul class="footer-links">
      <li><a href="index.html" data-i18n="nav.home">首页</a></li>
      <li><a href="catalog.html" data-i18n="nav.catalog">目录</a></li>
      <li><a href="characters.html" data-i18n="nav.characters">图鉴</a></li>
      <li><a href="about.html" data-i18n="nav.about">关于</a></li>
    </ul>
    <p class="footer-copy" data-i18n="footer.copy">© 2026 kailous. All rights reserved.</p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      'use strict';
      var charGrid    = document.getElementById('characters-grid');
      var factionGrid = document.getElementById('factions-grid');
      var itemGrid    = document.getElementById('items-grid');

      function dataUrl(lang) {
        return lang === 'en' ? 'data/characters_en.json' : 'data/characters.json';
      }

      function escHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function safeImageName(value) {
        var name = String(value || '').split(/[\\/]/).pop();
        return /^[\w.\-\u4e00-\u9fa5]+\.(png|jpe?g|webp|gif|svg)$/i.test(name) ? name : '';
      }

      function renderChars(data) {
        var charHtml    = '';
        var factionHtml = '';
        var itemHtml    = '';
        for (var id in data) {
          var item = data[id];
          var safeId = encodeURIComponent(id);
          var image = encodeURIComponent(safeImageName(item.image));
          var title = escHtml(item.title);
          var alias = escHtml(item.alias);
          var introText = escHtml((item.intro || '').replace(/\*+/g, '').replace(/\n/g, ' ').trim());
          if (item.type === 'character') {
            charHtml += '<a href="character-detail.html?id=' + safeId + '" class="character-card reveal">' +
              '<div class="character-card-image"><img src="images/' + image + '" alt="' + title + '" loading="lazy"></div>' +
              '<div class="character-card-body">' +
                '<h3 class="char-name">' + title + '</h3>' +
                '<p class="char-alias">' + alias + '</p>' +
                '<p class="char-desc">' + introText.substring(0, 120) + '…</p>' +
              '</div></a>';
          } else if (item.type === 'faction') {
            factionHtml += '<a href="character-detail.html?id=' + safeId + '" class="faction-card reveal">' +
              '<div class="faction-card-image"><img src="images/' + image + '" alt="' + title + '" loading="lazy"></div>' +
              '<div class="faction-card-body">' +
                '<p class="faction-label">FACTION</p>' +
                '<h3 class="faction-name">' + title + '</h3>' +
                '<p class="faction-alias">' + alias + '</p>' +
                '<p class="faction-desc">' + introText.substring(0, 160) + '…</p>' +
              '</div></a>';
          } else {
            itemHtml += '<a href="character-detail.html?id=' + safeId + '" class="item-card reveal">' +
              '<div class="item-card-image"><img src="images/' + image + '" alt="' + title + '" loading="lazy"></div>' +
              '<div class="item-card-body">' +
                '<h3>' + title + '</h3>' +
                '<p class="item-type">' + alias + '</p>' +
                '<p>' + introText.substring(0, 120) + '…</p>' +
              '</div></a>';
          }
        }
        charGrid.innerHTML    = charHtml;
        factionGrid.innerHTML = factionHtml;
        itemGrid.innerHTML    = itemHtml;
        setTimeout(function () {
          document.querySelectorAll('.reveal').forEach(function (el) { el.classList.add('visible'); });
        }, 100);
      }

      function loadChars() {
        var lang = window.i18n ? window.i18n.lang() : 'zh';
        fetch(dataUrl(lang))
          .then(function (res) { return res.json(); })
          .then(renderChars)
          .catch(function (e) { console.error('[characters]', e); });
      }

      loadChars();
      document.addEventListener('langchange', loadChars);
    })();
  </script>
</body>

</html>
