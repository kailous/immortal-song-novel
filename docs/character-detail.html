  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-hero {
      position: relative;
      padding-top: calc(var(--nav-height) + 2rem);
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      overflow: hidden;
    }

    .detail-hero-bg {
      position: absolute;
      inset: 0;
      opacity: 0.15;
      filter: blur(40px);
      z-index: 0;
    }

    .detail-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(var(--accent-gold-dim) 1px, transparent 1px),
        linear-gradient(to right, rgba(200, 168, 110, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(200, 168, 110, 0.05) 1px, transparent 1px);
      background-size: 40px 40px, 20px 20px, 20px 20px;
      opacity: 0.3;
      z-index: 1;
    }

    .detail-hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: var(--content-max-width);
      padding: 0 2rem;
      text-align: center;
    }

    .detail-avatar {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent-gold);
      box-shadow: 0 0 40px rgba(200, 168, 110, 0.3);
      margin-bottom: 2rem;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .detail-title {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .detail-alias {
      font-family: var(--font-sans);
      color: var(--accent-gold);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .detail-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .detail-section {
      margin-bottom: 4rem;
    }

    .detail-section h2 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--accent-gold);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .detail-section h2::before {
      content: '';
      width: 4px;
      height: 1.2rem;
      background: var(--gradient-gold);
    }

    .detail-body {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .detail-body p {
      margin-bottom: 1.5rem;
    }

    .detail-body ul {
      margin-bottom: 1.5rem;
      padding-left: 1.2rem;
    }

    .detail-body li {
      margin-bottom: 0.8rem;
      position: relative;
      list-style: none;
      padding-left: 1.5rem;
    }

    .detail-body li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.6rem;
      width: 6px;
      height: 6px;
      background: var(--accent-gold);
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent-gold);
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      z-index: 1002;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--accent-gold-dim);
      color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    @media (max-width: 768px) {
      .detail-title { font-size: 2.2rem; }
      .detail-avatar { width: 160px; height: 160px; }
    }
  </style>
</head>

<body>

  <a href="characters.html" class="back-btn" data-i18n="detail.back">← 返回图鉴</a>

  <div id="loader" style="position:fixed; inset:0; background:var(--bg-primary); z-index:1100; display:flex; align-items:center; justify-content:center;">
    <p style="color:var(--accent-gold); letter-spacing:0.2em;" data-i18n="detail.loading">正在读取档案...</p>
  </div>

  <article id="char-detail-container" style="display:none;">
    <div class="detail-hero">
      <div class="detail-hero-bg" id="hero-bg"></div>
      <div class="detail-hero-content">
        <img class="detail-avatar" id="char-img" src="" alt="">
        <h1 class="detail-title" id="char-title">加载中</h1>
        <p class="detail-alias" id="char-alias"></p>
      </div>
    </div>

    <div class="detail-container">
      <div class="detail-section">
        <div class="detail-body" id="char-intro"></div>
      </div>

      <div id="char-sections"></div>
    </div>
  </article>
